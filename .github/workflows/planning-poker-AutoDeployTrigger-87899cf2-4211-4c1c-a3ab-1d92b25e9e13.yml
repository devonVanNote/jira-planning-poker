name: Trigger auto deployment for planning-poker

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/planning-poker-AutoDeployTrigger-87899cf2-4211-4c1c-a3ab-1d92b25e9e13.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PLANNINGPOKER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PLANNINGPOKER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PLANNINGPOKER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: planningpokeracr.azurecr.io
          registryUsername: ${{ secrets.PLANNINGPOKER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PLANNINGPOKER_REGISTRY_PASSWORD }}
          containerAppName: planning-poker
          resourceGroup: rg-planning-poker
          imageToBuild: planningpokeracr.azurecr.io/planning-poker:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


